name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        go: ['1.24.0', '1.26.4']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - run: go test ./...
      - run: go vet ./...
      - if: runner.os == 'Linux' && matrix.go == '1.26.4'
        run: go test -race ./...
      - if: runner.os == 'Linux' && matrix.go == '1.26.4'
        run: go test -run TestOpenFileLoggerRejectsSymlinkEscape -v ./logx
      - if: runner.os == 'Linux' && matrix.go == '1.26.4'
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...
